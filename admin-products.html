<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX SHOP Products</title>


<style>

:root{
--bg:#faf7ef;
--gold:#d8ad32;
--border:#eadbb8;
--text:#17130d;
}


*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}


body{

margin:0;
background:var(--bg);
color:var(--text);

}


header{

height:85px;

background:white;

border-bottom:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 50px;

}


.logo{

font-size:28px;
font-weight:900;
color:var(--gold);

}


.back{

text-decoration:none;

background:var(--gold);

padding:12px 25px;

border-radius:30px;

color:black;

font-weight:bold;

}



.hero{

text-align:center;

padding:50px 20px;

}



.hero h1{

font-size:45px;

}



.hero span{

color:var(--gold);

}




.search{

text-align:center;

}



.search input{

width:350px;
max-width:90%;

padding:15px;

border-radius:30px;

border:1px solid var(--border);

font-size:16px;

}




.filters{

display:flex;

justify-content:center;

gap:10px;

flex-wrap:wrap;

padding:25px;

}



.filters button{

padding:10px 20px;

border-radius:25px;

border:1px solid var(--border);

background:white;

cursor:pointer;

}




.products{

padding:30px 50px;

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}




.card{

background:white;

padding:25px;

border-radius:25px;

border:1px solid var(--border);

}



.card img{

width:80px;

height:80px;

border-radius:20px;

object-fit:cover;

}



.category{

background:#fff2c7;

padding:7px 15px;

border-radius:20px;

font-size:12px;

}



.price{

font-size:35px;

font-weight:900;

color:var(--gold);

}



button.buy{

width:100%;

padding:15px;

border:none;

border-radius:25px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

}




@media(max-width:600px){

header{

padding:0 20px;

}

.products{

padding:20px;

}

}

</style>

</head>


<body>



<header>


<div class="logo">

PANKAZXX SHOP

</div>


<a class="back" href="index.html">

Home

</a>


</header>





<section class="hero">

<h1>

Premium <span>Digital Products</span>

</h1>


<p>

Choose your subscription

</p>

</section>






<div class="search">

<input 
id="search"
placeholder="Search products..."
onkeyup="searchProducts()">

</div>






<div class="filters">


<button onclick="filterProducts('All')">

All

</button>


<button onclick="filterProducts('AI')">

AI

</button>


<button onclick="filterProducts('Streaming')">

Streaming

</button>


<button onclick="filterProducts('Gaming')">

Gaming

</button>


<button onclick="filterProducts('Design')">

Design

</button>


</div>







<div class="products" id="products">

Loading products...

</div>








<script type="module">


import { supabase } from "./supabase.js";



let allProducts=[];

let currentProducts=[];




async function loadProducts(){



const {data,error}=await supabase

.from("products")

.select("*")

.eq("active",true);



if(error){

document.getElementById("products")
.innerHTML=
"Failed loading products";

console.log(error);

return;

}




allProducts=data;

currentProducts=data;


showProducts(data);


}








function showProducts(products){



let box=document.getElementById("products");


box.innerHTML="";



if(products.length===0){

box.innerHTML="No products available";

return;

}




products.forEach(product=>{


box.innerHTML+=`


<div class="card">


<img src="${product.image || 'logo.png'}">


<br><br>


<span class="category">

${product.category}

</span>



<h2>

${product.name}

</h2>



<p>

${product.description || ""}

</p>



<div class="price">

₹${product.price}

</div>



<p>

Stock:
${product.stock}

</p>



<button class="buy"

onclick="openProduct('${product.name}')">

View Plans

</button>



</div>



`;



});



}








window.openProduct=function(name){


window.location.href=

"product.html?name="

+
encodeURIComponent(name);


}







window.filterProducts=function(category){



if(category==="All"){

currentProducts=allProducts;

}

else{

currentProducts=

allProducts.filter(

p=>p.category===category

);

}



showProducts(currentProducts);


}







window.searchProducts=function(){


let value=

document.getElementById("search")
.value
.toLowerCase();



let result=

currentProducts.filter(

p=>

p.name.toLowerCase()
.includes(value)

);



showProducts(result);


}







loadProducts();



</script>



</body>

</html>
